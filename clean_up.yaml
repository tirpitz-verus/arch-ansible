# list of general cleanup tasks

- name: 2024-04-04 remove jre dependencies
  pacman:
    name: "{{ item }}"
    state: absent
  loop:
    - jre17-openjdk
    - jre21-openjdk

- name: 2024-05-10 remove skypeforlinux-stable-bin
  pacman:
    name: skypeforlinux-stable-bin
    state: absent

- name: 2024-05-10 remove vial-appimage
  pacman:
    name: vial-appimage
    state: absent

- name: 2025-07-05 switch from vim to neovim - uninstall software
  pacman:
    name: "{{ item }}"
    state: absent
  loop:
    - vim-airline
    - vim-airline-themes
    - powerline-fonts

- name: 2025-07-05 switch from vim to neovim - remove files
  ansible.builtin.file:
    path: "~{{ item }}/.vimrc"
    state: absent
  loop: "{{ users_to_setup }}"

- name: remove old java 17
  pacman:
    name: "{{ item }}"
    state: absent
  loop:
    - openjdk17-doc
    - openjdk17-src
    - jdk17-openjdk

#
# 2025-10-11
# remove xorg and i3
#
- name: remove xorg and i3
  pacman:
    name: "{{ item }}"
    state: present
  loop:
    - xorg-server
    - xorg-xrandr
    - xorg-xbacklight
    - xorg-xinput
    - xorg-xprop
    - arandr
    - i3-wm
    - i3blocks
    - i3lock
    - feh
    - dmenu
    - xorg-xinit
    - xdm-archlinux
- name: remove .xinitrc
  ansible.builtin.file:
    path: "~{{ item }}/.xinitrc"
    state: absent
  loop: "{{ users_to_setup }}"
- name: remove .Xresources
  ansible.builtin.file:
    path: /etc/X11/xinit/.Xresources
    state: absent
- name: remove i3 dir
  ansible.builtin.file:
    path: "~{{ item }}/.config/i3"
    state: absent
  loop: "{{ users_to_setup }}"
- name: remove .screenlayout
  ansible.builtin.file:
    path: "~{{ item }}/.screenlayout"
    state: absent
  loop: "{{ users_to_setup }}"
- name: remove 10-disable_dpms.conf
  ansible.builtin.file:
    path: "/etc/X11/xorg.conf.d/10-disable_dpms.conf"
    state: absent
- name: remove 10-disable_screen_blanking.conf
  ansible.builtin.file:
    path: "/etc/X11/xorg.conf.d/10-disable_screen_blanking.conf"
    state: absent

#
# 2025-10-11
# swap PulseAudio for PipeWire
#
- name: uninstall pulseaudio
  pacman:
    name: "{{ item }}"
    state: absent
  loop:
    - pavucontrol
    - pulseaudio-alsa
    - pulseaudio-equalizer
    - pulseaudio-bluetooth
    - pulseaudio
